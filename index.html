<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registration Form</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
    }

    h1 {
      text-align: center;
      margin-top: 20px;
    }

    form {
      width: 50%;
      margin: 0 auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
    }

    label,
    input,
    button {
      display: block;
      width: 100%;
      margin-bottom: 15px;
    }

    input,
    button {
      padding: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      transition: border-color 0.3s ease-in-out;
    }

    input:focus {
      outline: none;
      border-color: #007bff;
    }

    input[type="checkbox"] {
      display: inline-block;
      margin-right: 5px;
    }

    button {
      color: #fff;
      background-color: #007bff;
      border: none;
      cursor: pointer;
      transition: background-color 0.3s ease-in-out;
    }

    button:hover {
      background-color: #0056b3;
    }

    #error-message {
      color: red;
      margin-top: 15px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 30px;
    }

    table,
    th,
    td {
      border: 1px solid #ddd;
    }

    th,
    td {
      padding: 10px;
      text-align: left;
    }

    table th {
      background-color: #007bff;
      color: white;
    }

    table td {
      transition: background-color 0.3s ease-in-out;
    }

    table td:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>
  <h1>Registration Form</h1>
  <form id="registrationForm" onsubmit="submitForm(event)">
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Enter name" name="name" required /><br />
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter email" name="email" required /><br />
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" name="password" required /><br />
    <label for="dob">DOB</label>
    <input type="date" id="dob" name="dob" required /><br />
    <input type="checkbox" id="terms" name="terms" required />
    <label for="terms">Accept Terms &amp; Conditions</label><br />

    <button type="submit">Submit</button>
  </form>
  <h2>Registration Data</h2>
  <div id="error-message"></div>
  <table id="userTable">
    <thead>
      <tr>
        <th>Name</th>
        <th>Email</th>
        <th>Password</th>
        <th>Dob</th>
        <th>Accepted terms</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <script src="index.js"></script>
</body>
</html>
